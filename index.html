<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARC Technologies | Defence Technology. Redefined.</title>
  <meta name="description" content="Advanced Research and Combat Technologies Ltd. Defence Technology. Redefined." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --navy:      #0A1628;
      --navy-deep: #050D1A;
      --blue:      #0052CC;
      --blue-light:#1a6fff;
      --white:     #FFFFFF;
      --white-dim: rgba(255,255,255,0.55);
    }

    html, body {
      height: 100%; width: 100%;
      background-color: var(--navy-deep);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    #bgCanvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

    .glow-overlay {
      position:fixed; inset:0;
      background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(0,82,204,0.12) 0%, transparent 70%);
      pointer-events:none; z-index:1;
    }

    .page {
      position:relative; z-index:2;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      min-height:100vh; padding:2rem; text-align:center;
    }

    .top-rule {
      position:fixed; top:0; left:0; right:0; height:2px; z-index:3;
      background: linear-gradient(90deg, transparent, var(--blue), var(--blue-light), var(--blue), transparent);
      animation: ruleGlow 3s ease-in-out infinite alternate;
    }
    @keyframes ruleGlow { from{opacity:.6} to{opacity:1} }

    .bottom-rule {
      position:fixed; bottom:0; left:0; right:0; height:1px; z-index:3;
      background: linear-gradient(90deg, transparent, rgba(0,82,204,0.4), transparent);
    }

    .logo-wrap { margin-bottom:2.5rem; opacity:0; animation:fadeUp 1s ease forwards 0.3s; }
    .logo-wrap img { width:320px; max-width:70vw; display:block; }

    .divider {
      width:1px; height:48px;
      background: linear-gradient(to bottom, transparent, var(--blue), transparent);
      margin:0 auto 2.5rem; opacity:0; animation:fadeUp 1s ease forwards 0.6s;
    }

    .tagline {
      font-family:'Rajdhani',sans-serif;
      font-size:clamp(1.4rem,4vw,2.2rem); font-weight:700;
      letter-spacing:.18em; text-transform:uppercase;
      color:var(--white); margin-bottom:1rem;
      opacity:0; animation:fadeUp 1s ease forwards 0.9s;
    }
    .tagline span { color:var(--blue-light); }

    .sub-tagline {
      font-family:'Rajdhani',sans-serif;
      font-size:clamp(.85rem,2vw,1.05rem); font-weight:300;
      letter-spacing:.35em; text-transform:uppercase;
      color:var(--white-dim); margin-bottom:3.5rem;
      opacity:0; animation:fadeUp 1s ease forwards 1.1s;
    }

    .status {
      display:inline-flex; align-items:center; gap:.6rem;
      border:1px solid rgba(0,82,204,.35); background:rgba(0,82,204,.07);
      padding:.55rem 1.4rem; border-radius:2px;
      font-family:'Rajdhani',sans-serif; font-size:.8rem; font-weight:600;
      letter-spacing:.25em; text-transform:uppercase;
      color:var(--white-dim); margin-bottom:2rem;
      opacity:0; animation:fadeUp 1s ease forwards 1.3s;
    }

    .status-dot {
      width:6px; height:6px; border-radius:50%;
      background:var(--blue-light);
      animation:pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

    .contact {
      font-size:.78rem; letter-spacing:.12em;
      color:var(--white-dim); text-transform:uppercase;
      margin-bottom:1.5rem;
      opacity:0; animation:fadeUp 1s ease forwards 1.5s;
    }
    .contact a {
      color:var(--white-dim); text-decoration:none;
      border-bottom:1px solid rgba(255,255,255,.2); padding-bottom:1px;
      transition:color .3s,border-color .3s;
    }
    .contact a:hover { color:var(--white); border-color:var(--blue-light); }

    /* LinkedIn link */
    .linkedin {
      opacity:0; animation:fadeUp 1s ease forwards 1.7s;
    }
    .linkedin a {
      display:inline-flex; align-items:center; gap:.5rem;
      font-size:.75rem; letter-spacing:.12em; text-transform:uppercase;
      color:var(--white-dim); text-decoration:none;
      border:1px solid rgba(0,82,204,.25); background:rgba(0,82,204,.05);
      padding:.4rem 1rem; border-radius:2px;
      transition:color .3s, border-color .3s, background .3s;
    }
    .linkedin a:hover {
      color:var(--white); border-color:var(--blue-light);
      background:rgba(0,82,204,.12);
    }
    .linkedin svg { width:14px; height:14px; fill:currentColor; flex-shrink:0; }

    .corner { position:fixed; width:20px; height:20px; opacity:.3; z-index:3; }
    .corner--tl { top:16px; left:16px; border-top:1px solid var(--blue); border-left:1px solid var(--blue); }
    .corner--tr { top:16px; right:16px; border-top:1px solid var(--blue); border-right:1px solid var(--blue); }
    .corner--bl { bottom:16px; left:16px; border-bottom:1px solid var(--blue); border-left:1px solid var(--blue); }
    .corner--br { bottom:16px; right:16px; border-bottom:1px solid var(--blue); border-right:1px solid var(--blue); }

    .founded {
      position:fixed; bottom:1.5rem; left:1.5rem;
      font-size:.62rem; letter-spacing:.1em;
      color:rgba(255,255,255,.25); text-transform:uppercase;
      display:flex; align-items:center; gap:.5rem; z-index:3;
    }
    .flag { width:18px; height:12px; opacity:.35; flex-shrink:0; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

    @media(max-width:480px) {
      .logo-wrap img { width:160px; }
      .founded { display:none; }
    }
  </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="glow-overlay"></div>
<div class="top-rule"></div>
<div class="bottom-rule"></div>
<div class="corner corner--tl"></div>
<div class="corner corner--tr"></div>
<div class="corner corner--bl"></div>
<div class="corner corner--br"></div>

<main class="page">
  <div class="logo-wrap">
    <img src="Logo_1.png" alt="ARC Technologies" onerror="this.style.display='none';document.getElementById('logo-text').style.display='block'" />
    <div id="logo-text" style="display:none;font-family:'Rajdhani',sans-serif;font-size:2.2rem;font-weight:700;letter-spacing:.2em;color:#fff;">ARC <span style="color:#1a6fff;">TECHNOLOGIES</span></div>
  </div>
  <div class="divider"></div>
  <p class="tagline">Defence Technology<span>.</span> Redefined<span>.</span></p>
  <p class="sub-tagline">Unchanged since 1866 &nbsp;&middot;&nbsp; Until now</p>
  <div class="status">
    <span class="status-dot"></span>
    Website launching soon
  </div>
  <p class="contact">
    Enquiries &nbsp;&mdash;&nbsp;
    <a href="mailto:jordan.oneill@arc-technologies.co.uk">jordan.oneill@arc-technologies.co.uk</a>
  </p>
  <div class="linkedin">
    <a href="https://www.linkedin.com/company/arc-t/" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
      </svg>
      Follow on LinkedIn
    </a>
  </div>
</main>

<div class="founded">
  <svg class="flag" viewBox="0 0 60 30" xmlns="http://www.w3.org/2000/svg">
    <clipPath id="c"><rect width="60" height="30"/></clipPath>
    <rect width="60" height="30" fill="#012169"/>
    <path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6" clip-path="url(#c)"/>
    <path d="M0,0 L60,30 M60,0 L0,30" stroke="#C8102E" stroke-width="4" clip-path="url(#c)"/>
    <path d="M30,0 V30 M0,15 H60" stroke="#fff" stroke-width="10"/>
    <path d="M30,0 V30 M0,15 H60" stroke="#C8102E" stroke-width="6"/>
  </svg>
  Founded in the UK &nbsp;&middot;&nbsp; 2025
</div>

<script>
  const canvas = document.getElementById('bgCanvas');
  const ctx    = canvas.getContext('2d');
  let W, H, nodes, animId;

  const BLUE       = 'rgba(0,82,204,';
  const BLUE_LIGHT = 'rgba(26,111,255,';
  const NODE_COUNT = 55;
  const MAX_DIST   = 160;

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }

  function makeNode() {
    return {
      x: Math.random()*W, y: Math.random()*H,
      vx:(Math.random()-.5)*.4, vy:(Math.random()-.5)*.4,
      r: Math.random()*1.5+.5,
      pulse: Math.random()*Math.PI*2
    };
  }

  function init() { resize(); nodes = Array.from({length:NODE_COUNT}, makeNode); }

  function draw() {
    ctx.clearRect(0,0,W,H);

    const offsetY = (Date.now()*.00006*20) % 60;
    ctx.strokeStyle = 'rgba(0,82,204,0.045)';
    ctx.lineWidth   = 0.5;
    for (let x=0; x<W+60; x+=60) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y=-60+offsetY; y<H+60; y+=60) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

    nodes.forEach(n => {
      n.x += n.vx; n.y += n.vy; n.pulse += .02;
      if (n.x<0||n.x>W) n.vx*=-1;
      if (n.y<0||n.y>H) n.vy*=-1;
      const a = .25+.15*Math.sin(n.pulse);
      ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
      ctx.fillStyle = BLUE_LIGHT+a+')'; ctx.fill();
    });

    for (let i=0;i<nodes.length;i++) {
      for (let j=i+1;j<nodes.length;j++) {
        const a=nodes[i], b=nodes[j];
        const d=Math.hypot(a.x-b.x,a.y-b.y);
        if (d<MAX_DIST) {
          ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
          ctx.strokeStyle = BLUE+((1-d/MAX_DIST)*.18)+')';
          ctx.lineWidth=.6; ctx.stroke();
        }
      }
    }

    if (Math.random()<.008) {
      const a=nodes[Math.floor(Math.random()*nodes.length)];
      const b=nodes[Math.floor(Math.random()*nodes.length)];
      const g=ctx.createLinearGradient(a.x,a.y,b.x,b.y);
      g.addColorStop(0,'rgba(26,111,255,0)');
      g.addColorStop(.5,'rgba(26,111,255,0.6)');
      g.addColorStop(1,'rgba(26,111,255,0)');
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
      ctx.strokeStyle=g; ctx.lineWidth=1.2; ctx.stroke();
    }

    animId = requestAnimationFrame(draw);
  }

  window.addEventListener('resize',()=>{ cancelAnimationFrame(animId); init(); draw(); });
  init(); draw();
</script>
</body>
</html>
